name: Node.js CI

on:
  push:
    branches:
      - main
  pull_request:
     branches:
       - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      -  name: checkout code
         uses: actions/checkout@v4
      -  name: setup-node
         uses: actions/setup-node@v4
         with:
            node-version: '20'
      -  name: cache-npm-dependencies
         uses: actions/cache@v4
         with:
           path: ~/.npm
           key: hashFiles('package-lock.json')
      -  name: install dependencies
         run: npm ci 
      -  name: tests
         run: npm test
  
      -  name: build
         run: npm run build 
           
